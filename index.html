<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galway Equine Centres</title>
  <link rel="icon" type="image/png" href="image.png" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    /* Reset & full-viewport map */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }



    /* ── Tooltip styling & smooth entrance ──────────────────────────── */
    .leaflet-tooltip.custom-tooltip {
      background-color: #ffffff;
      border: 1px solid #3388ff;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      min-width: 240px;
      max-width: 320px;
      white-space: normal;   /* allow wrapping */
      word-wrap: break-word; /* break long words */
      /* smooth animation */
      animation: tooltipFadeIn 0.25s ease-out forwards;
      transition: opacity 0.2s ease;
    }

    .leaflet-tooltip.custom-tooltip .tooltip-name {
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 3px;
    }

    .leaflet-tooltip.custom-tooltip .tooltip-desc {
      color: #444;
      font-weight: 400;
    }

    /* ── Location dropdown panel ───────────────────────────────────── */
    .location-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      width: 220px;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #3388ff;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    .panel-header span {
      font-weight: 600;
      font-size: 14px;
    }

    .panel-header .arrow {
      font-size: 12px;
      transition: transform 0.25s ease;
    }

    .panel-header .arrow.open {
      transform: rotate(180deg);
    }

    .panel-list {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .panel-list.open {
      max-height: 400px;
    }

    .panel-list li {
      padding: 10px 14px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      transition: background-color 0.15s;
    }

    .panel-list li:last-child {
      border-bottom: none;
    }

    .panel-list li:hover {
      background-color: #e8f0fe;
    }

    .panel-list li.active {
      background-color: #3388ff;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Dropdown panel (built by JS, but shell lives here) -->
  <div class="location-panel" id="locationPanel">
    <div class="panel-header" id="panelToggle">
      <span>📍 Locations</span>
      <span class="arrow open" id="panelArrow">▼</span>
    </div>
    <ul class="panel-list open" id="panelList"></ul>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // ── Location Data ────────────────────────────────────────────────
    const locations = [
      {
        name: "Eyre Square",
        description: "Galway's central public square and park, a popular meeting point in the heart of the city.",
        lat: 53.2745,
        lng: -9.0490
      },
      {
        name: "Spanish Arch",
        description: "A 16th-century archway that once protected merchant ships unloading goods from Spain.",
        lat: 53.2698,
        lng: -9.0538
      },
      {
        name: "Galway Cathedral",
        description: "The Cathedral of Our Lady Assumed into Heaven and St Nicholas — one of Europe's youngest stone cathedrals.",
        lat: 53.2730,
        lng: -9.0590
      }
    ];

    // ── County Galway bounding box ───────────────────────────────────
    // SW corner → NE corner (includes Aran Islands & east to Ballinasloe)
    const galwayBounds = L.latLngBounds(
      [52.96, -10.68],   // south-west
      [53.63,  -7.99]    // north-east
    );

    // ── Map Initialisation ───────────────────────────────────────────
    const map = L.map("map", {
      center: [53.2707, -9.0568],
      zoom: 14,
      minZoom: 9,             // don't zoom out past the county
      maxBounds: galwayBounds,
      maxBoundsViscosity: 1.0 // hard stop at the edges
    });

    // OpenStreetMap tile layer
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // ── Render Markers with Hover Tooltips ───────────────────────────
    const markers = [];

    locations.forEach(function (loc) {
      const marker = L.marker([loc.lat, loc.lng]).addTo(map);

      const tooltipContent =
        '<div class="tooltip-name">' + loc.name + '</div>' +
        '<div class="tooltip-desc">' + loc.description + '</div>';

      marker.bindTooltip(tooltipContent, {
        direction: "top",
        offset: [-15, -20],
        className: "custom-tooltip"
      });

      markers.push(marker);
    });

    // ── Dropdown Panel Logic ─────────────────────────────────────────
    const panelToggle = document.getElementById("panelToggle");
    const panelArrow  = document.getElementById("panelArrow");
    const panelList   = document.getElementById("panelList");

    // Populate list items
    locations.forEach(function (loc, i) {
      const li = document.createElement("li");
      li.textContent = loc.name;

      li.addEventListener("click", function () {
        // Fly to the selected location
        map.flyTo([loc.lat, loc.lng], 17, { duration: 0.8 });

        // Open its tooltip briefly so the user sees the info
        markers[i].openTooltip();

        // Highlight active item
        panelList.querySelectorAll("li").forEach(function (el) {
          el.classList.remove("active");
        });
        li.classList.add("active");
      });

      panelList.appendChild(li);
    });

    // Toggle open / collapse
    panelToggle.addEventListener("click", function () {
      panelList.classList.toggle("open");
      panelArrow.classList.toggle("open");
    });
  </script>

</body>
</html>
