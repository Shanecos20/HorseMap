<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galway Equine Centres</title>
  <link rel="icon" type="image/png" href="image.png" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    /* Reset & full-viewport map */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }



    /* ── Tooltip styling & smooth entrance ──────────────────────────── */
    .leaflet-tooltip.custom-tooltip {
      background-color: #ffffff;
      border: 1px solid #3388ff;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      min-width: 240px;
      max-width: 320px;
      white-space: normal;   /* allow wrapping */
      word-wrap: break-word; /* break long words */
      transition: opacity 0.2s ease;
    }

    .leaflet-tooltip.custom-tooltip .tooltip-name {
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 3px;
    }

    .leaflet-tooltip.custom-tooltip .tooltip-desc {
      color: #444;
      font-weight: 400;
    }

    /* ── Location dropdown panel ───────────────────────────────────── */
    .location-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
      width: 220px;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #3388ff;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    .panel-header span {
      font-weight: 600;
      font-size: 14px;
    }

    .panel-header .arrow {
      font-size: 12px;
      transition: transform 0.25s ease;
    }

    .panel-header .arrow.open {
      transform: rotate(180deg);
    }

    .panel-list {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .panel-list.open {
      max-height: 60vh;
      overflow-y: auto;
    }

    .panel-list li {
      padding: 10px 14px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      transition: background-color 0.15s;
    }

    .panel-list li:last-child {
      border-bottom: none;
    }

    .panel-list li:hover {
      background-color: #e8f0fe;
    }

    .panel-list li.active {
      background-color: #3388ff;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Dropdown panel (built by JS, but shell lives here) -->
  <div class="location-panel" id="locationPanel">
    <div class="panel-header" id="panelToggle">
      <span>📍 Locations</span>
      <span class="arrow open" id="panelArrow">▼</span>
    </div>
    <ul class="panel-list open" id="panelList"></ul>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // ── Location Data ────────────────────────────────────────────────
    const locations = [
      { name: "Leisure Horse Ireland",        lat: 53.253387514470845, lng: -9.227995593306996,  type: "Organization" },
      { name: "West Coast Vets",              lat: 53.25716877298111, lng: -9.155501506470095,  type: "Vet" },
      { name: "ARK Vets",                     lat: 53.27137047598495, lng: -9.065654506425775,  type: "Vet" },
      { name: "Moycullen Riding Centre",      lat: 53.30281309774886, lng: -9.15971129386534,  type: "Riding School" },
      { name: "Kevin Reilly Connemara Ponies", lat: 53.3064664772366, lng: -9.111936355382252, type: "Breeder" },
      { name: "Bushypark Vets",               lat: 53.287009472120346, lng: -9.068451701365404,  type: "Vet" },
      { name: "Feeneys Equestrian Centre",    lat: 53.28814371799418, lng: -9.109934979047924,  type: "Riding School" },
      { name: "Glenina Vets",                 lat: 53.27925394490098, lng: -9.020522207941411,  type: "Vet" },
      { name: "The Equine Warehouse",         lat: 53.363205079606495, lng: -8.991613533749705,  type: "Retail" },
      { name: "Galway Bay Stud",              lat: 53.282817508590924, lng: -8.966883719016463,  type: "Stud" },
      { name: "Duffys Equestrian",            lat: 53.32211143826494, lng: -8.969542571742553,  type: "Equestrian Centre" },
      { name: "Mullins Sport Horses",         lat: 53.32020396336472, lng: -8.94365645919947,  type: "Sport Horses" },
      { name: "Galway Equestrian Centre",     lat: 53.33156632095057, lng: -8.828536388103538,  type: "Equestrian Centre" },
      { name: "Hadley Sport Horses",          lat: 53.20348657621704, lng: -8.671272033026241,  type: "Sport Horses" },
      { name: "Hadley Transport",             lat: 53.1976935433153, lng: -8.666703020497101,  type: "Transport" },
      { name: "Eves Riding Centre",           lat: 53.48446272749979, lng: -8.845967521235112,  type: "Riding School" },
      { name: "J.Naughton Equine",            lat: 53.325235081729986, lng: -8.741370093524267,  type: "Services" },
      { name: "CGH Blazers",                  lat: 53.2500, lng: -8.6000,  type: "Hunt" },
      { name: "Horses in Ireland (An Sibin)", lat: 52.98042262163658, lng: -8.404160110395503,  type: "Riding Centre" },
      { name: "Connemara Pony Sales",         lat: 53.48802995025841, lng: -10.008181704087969, type: "Sales" },
      { name: "Ower Equestrian",              lat: 53.3868607156168, lng: -9.163845244794105,  type: "Equestrian Centre" },
      { name: "GAMUT Stud (Rosshill Farm)",   lat: 53.269608451275495, lng: -8.986848473284798,  type: "Stud" },
      { name: "Parkroe Stud",                 lat: 53.246762117613756, lng: -8.74947078619015,  type: "Stud" },
      { name: "Slieve Aughty Equestrian",     lat: 53.13415068066143, lng: -8.47280329463522,  type: "Equestrian Centre" },
      { name: "Horses Connect Galway",        lat: 53.29600868111012, lng: -9.09741832250517,  type: "Therapy/Training" },
      { name: "Marley Stables",               lat: 53.542279774715595, lng: -8.836894117105446,  type: "Stables" },
      { name: "Callatra Stables",             lat: 53.12052739517278, lng: -8.467486211170202,  type: "Stables" },
      { name: "Glennamaddy Equestrian Centre", lat: 53.596314144044285, lng: -8.56827914574696, type: "Equestrian Centre" }
    ];

    // ── Map Initialisation ───────────────────────────────────────────
    const map = L.map("map", {
      center: [53.30, -8.85],
      zoom: 10,
      minZoom: 9,             // don't zoom out past the county
      maxBoundsViscosity: 1.0 // hard stop at the edges
    });

    // OpenStreetMap tile layer
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // ── Render Markers with Hover Tooltips ───────────────────────────
    const markers = [];

    locations.forEach(function (loc) {
      const marker = L.marker([loc.lat, loc.lng]).addTo(map);

      const tooltipContent =
        '<div class="tooltip-name">' + loc.name + '</div>' +
        '<div class="tooltip-desc">' + loc.type + '</div>';

      marker.bindTooltip(tooltipContent, {
        direction: "top",
        offset: [-15, -20],
        className: "custom-tooltip"
      });

      markers.push(marker);
    });

    // ── Dropdown Panel Logic ─────────────────────────────────────────
    const panelToggle = document.getElementById("panelToggle");
    const panelArrow  = document.getElementById("panelArrow");
    const panelList   = document.getElementById("panelList");

    // Populate list items
    locations.forEach(function (loc, i) {
      const li = document.createElement("li");
      li.textContent = loc.name;

      li.addEventListener("click", function () {
        // Fly to the selected location
        map.flyTo([loc.lat, loc.lng], 17, { duration: 0.8 });

        // Open its tooltip briefly so the user sees the info
        markers[i].openTooltip();

        // Highlight active item
        panelList.querySelectorAll("li").forEach(function (el) {
          el.classList.remove("active");
        });
        li.classList.add("active");
      });

      panelList.appendChild(li);
    });

    // Toggle open / collapse
    panelToggle.addEventListener("click", function () {
      panelList.classList.toggle("open");
      panelArrow.classList.toggle("open");
    });
  </script>

</body>
</html>
